<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kashish Soni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #0dcaf0;
            border-radius: 20px;
            padding: 40px;
            margin-top: 80px;
            transition: all 0.4s ease;
        }
        .contact-card:hover {
            box-shadow: 0 0 30px rgba(13, 202, 240, 0.3);
            transform: translateY(-5px);
        }
        .email-btn {
            background-color: #0dcaf0;
            color: #000;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .email-btn:hover {
            background-color: #00f2fe;
            color: #000;
            box-shadow: 0 0 15px #0dcaf0;
        }
        .email-display {
            font-family: 'Courier New', Courier, monospace;
            color: #a0a0a0;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-dark text-white">

                <li class="nav-item"><a class="nav-link px-3" href="projects.html">Projects</a></li>
                <li class="nav-item"><a class="nav-link px-3 active text-info" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="contact-card">
                <h2 class="display-6 fw-bold mb-3">Let's <span class="text-info">Connect!</span></h2>
                <p class="lead mb-4">Whether you have a question about my IoT projects, the Service Allocation system, or just want to say hi—my inbox is always open.</p>
                
                <div class="mb-4">
                    <span class="email-display mb-3">kashishrsoni0505@gmail.com</span>
                </div>

                <a href="mailto:kashishrsoni0505@gmail.com?subject=Inquiry from Portfolio&body=Hi Kashish," class="email-btn">
                    Send Me an Email
                </a>

                <div class="mt-5 pt-3 border-top border-secondary">
                    <p class="small text-muted mb-0">Based in Ahmedabad, Gujarat</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        // jQuery effect: Fade in the card on load
        $('.contact-card').hide().fadeIn(1200);
    });
</script>
